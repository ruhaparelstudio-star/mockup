  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

4px 16px rgba(212,84,138,0.06);\">\n          <button onclick=\"{{ addToCartSP }}\" style=\"flex:1; background:white; color:#D4548A; border:2px solid #D4548A; padding:12px; border-radius:50px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:'DM Sans',sans-serif;\">+ Keranjang<\u002Fbutton>\n          <button onclick=\"{{ buyNow }}\" style=\"flex:1.4; background:linear-gradient(135deg,#D4548A,#AD1457); color:white; border:none; padding:12px; border-radius:50px; font-size:12px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(212,84,138,0.4); white-space:nowrap; font-family:'DM Sans',sans-serif;\">⚡ Beli Sekarang<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══ BOTTOM NAV ══ -->\n      <div style=\"background:rgba(255,255,255,0.97); backdrop-filter:blur(20px); border-top:1px solid #fce8f0; display:flex; flex-shrink:0; padding:0 2px;\">\n\n        <button onclick=\"{{ navHome }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:9px 0 12px; gap:4px; background:none; border:none; cursor:pointer; color:{{ navHomeColor }};\">\n          <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"{{ navHomeFill }}\" stroke=\"{{ navHomeColor }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\"><\u002Fpath><polyline points=\"9 22 9 12 15 12 15 22\"><\u002Fpolyline><\u002Fsvg>\n          <span style=\"font-size:10px; font-weight:600;\">Home<\u002Fspan>\n        <\u002Fbutton>\n\n        <button onclick=\"{{ navShop }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:9px 0 12px; gap:4px; background:none; border:none; cursor:pointer; color:{{ navShopColor }};\">\n          <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ navShopColor }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 9h18l-1.68 10.39a2 2 0 0 1-1.97 1.61H6.65a2 2 0 0 1-1.97-1.61L3 9z\"><\u002Fpath><path d=\"M8 9V5a4 4 0 0 1 8 0v4\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:10px; font-weight:600;\">Shop<\u002Fspan>\n        <\u002Fbutton>\n\n        <button onclick=\"{{ navCart }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:9px 0 12px; gap:4px; background:none; border:none; cursor:pointer; color:{{ navCartColor }}; position:relative;\">\n          <div style=\"position:relative;\">\n            <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"{{ navCartFill }}\" stroke=\"{{ navCartColor }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z\"><\u002Fpath><line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\"><\u002Fline><path d=\"M16 10a4 4 0 0 1-8 0\"><\u002Fpath><\u002Fsvg>\n            <sc-if value=\"{{ cartNotEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"position:absolute; top:-6px; right:-8px; background:#D4548A; color:white; border-radius:50%; width:15px; height:15px; font-size:8px; font-weight:700; display:flex; align-items:center; justify-content:center; border:1.5px solid white;\">{{ cartCount }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <span style=\"font-size:10px; font-weight:600;\">Keranjang<\u002Fspan>\n        <\u002Fbutton>\n\n        <button onclick=\"{{ navProfile }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:9px 0 12px; gap:4px; background:none; border:none; cursor:pointer; color:{{ navProfileColor }};\">\n          <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"{{ navProfileFill }}\" stroke=\"{{ navProfileColor }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 her untuk hasil natural', vars:[{key:'shade',opts:['01 Ivory','02 Nude','03 Natural','04 Honey']}] },\n      { id:6, name:'Natural Blush Duo', cat:'makeup', emoji:'🌸', bg:'linear-gradient(145deg,#F8BBD0,#F48FB1)', price:129000, orig:null, badge:null, badgeBg:null, rating:4.7, reviews:675, sold:1400, stock:93, desc:'Blush duo dengan dua shade buildable untuk efek natural flush atau sculpted. Formula pigmented dan tahan lama sepanjang hari.', how:'1. Senyum lembut untuk temukan apel pipi\\n2. Sapukan blush dari apel pipi ke pelipis\\n3. Blend hingga natural\\n4. Layer untuk warna lebih intens', vars:[{key:'tipe',opts:['Matte Duo','Shimmer Duo']}] },\n      { id:7, name:'Garden Bloom EDP', cat:'perfume', emoji:'🌺', bg:'linear-gradient(145deg,#F8E8F8,#CE93D8)', price:389000, orig:null, badge:'NEW', badgeBg:'#43A047', rating:4.9, reviews:542, sold:890, stock:30, desc:'Eau de Parfum bunga yang elegan. Top: Rose & Jasmine. Heart: Peony & Magnolia. Base: Sandalwood & Musk. Ketahanan 8–12 jam.', how:'1. Semprotkan pada titik nadi (pergelangan, leher)\\n2. Jangan digosok, biarkan meresap\\n3. Untuk daya tahan lebih, gunakan pada kulit lembap setelah mandi', vars:[{key:'ukuran',opts:['30ml','50ml','100ml']}] },\n      { id:8, name:'Rose Noir Parfum Oil', cat:'perfume', emoji:'🥀', bg:'linear-gradient(145deg,#EDE7F6,#9575CD)', price:175000, orig:null, badge:null, badgeBg:null, rating:4.8, reviews:334, sold:720, stock:45, desc:'Parfum oil konsentrat mawar hitam yang mewah dan sensual. Tanpa alkohol, aman untuk semua jenis kulit. Tahan hingga 12 jam dari satu tetes.', how:'1. Roll-on pada pergelangan, leher, atau titik nadi\\n2. Tepuk lembut untuk aktivasi aroma\\n3. Simpan di tempat sejuk dan gelap', vars:[{key:'ukuran',opts:['5ml Roll-on','10ml Roll-on']}] },\n      { id:9, name:'Brow Definer Pencil', cat:'makeup', emoji:'✏️', bg:'linear-gradient(145deg,#EFEBE9,#BCAAA4)', price:75000, orig:null, badge:null, badgeBg:null, rating:4.6, reviews:1230, sold:4500, stock:200, desc:'Pens ];\n  }\n\n  componentDidMount() {\n    this._timer = setInterval(() => {\n      this.setState(s => {\n        let { h, m, s: sec } = { h: s.countdown.h, m: s.countdown.m, s: s.countdown.s };\n        sec--;\n        if (sec < 0) { sec = 59; m--; }\n        if (m < 0) { m = 59; h--; }\n        if (h < 0) { h = 0; m = 0; sec = 0; }\n        return { countdown: { h, m, s: sec } };\n      });\n    }, 1000);\n  }\n\n  componentWillUnmount() { clearInterval(this._timer); }\n\n  _fmt(n) { return 'Rp ' + n.toLocaleString('id-ID'); }\n\n  _toast(msg) {\n    this.setState({ toast: msg });\n    if (this._toastTimer) clearTimeout(this._toastTimer);\n    this._toastTimer = setTimeout(() => this.setState({ toast: null }), 2500);\n  }\n\n  _addCart(product, vars, qty) {\n    this.setState(s => {\n      const cart = [...s.cart];\n      const key = product.id + JSON.stringify(vars);\n      const idx = cart.findIndex(x => x.key === key);\n      if (idx >= 0) { cart[idx] = { ...cart[idx], qty: cart[idx].qty + qty }; }\n      else { cart.push({ key, id: product.id, qty, vars, product }); }\n      return { cart };\n    });\n    this._toast('✓ Ditambahkan ke keranjang!');\n  }\n\n  _toggleWish(id) {\n    this.setState(s => ({ wishlist: s.wishlist.includes(id) ? s.wishlist.filter(x => x !== id) : [...s.wishlist, id] }));\n  }\n\n  _nav(screen, extra = {}) {\n    this.setState({ prevScreen: this.state.screen, screen, ...extra });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const prods = this._products;\n    const fmt = n => this._fmt(n);\n    const pad = n => String(n).padStart(2, '0');\n\n    const homeProds = s.homeTab === 'all' ? prods : prods.filter(p => p.cat === s.homeTab);\n    const shopProds = prods.filter(p => {\n      const catOk = s.shopCat === 'all' || p.cat === s.shopCat;\n      const srchOk = !s.shopSearch || p.name.toLowerCase().includes(s.shopSearch.toLowerCase());\n      return catOk && srchOk;\n    });\n    const sp = prods.find(p => p.id === s.selProductId);\n\n    const cartCount = s.cart.reduce((a, x) => a + x.qty, 0);\n    const cartTotal = s.cart.reduce((a, x) => a + x.product.price * x.qty, 0);\n\n    const tabBg  = t => s.homeTab === t ? '#D4548A' : 'white';\n    const tabCl  = t => s.homeTab === t ? 'white' : '#888';\n    const tabBo  = t => s.homeTab === t ? '#D4548A' : '#e8e8e8';\n    const sCatBg = t => s.shopCat === t ? '#D4548A' : '#F0F0F5';\n    const sCatCl = t => s.shopCat === t ? 'white' : '#666';\n    const ptBo   = t => s.productTab === t ? '#D4548A' : 'transparent';\n    const ptCl   = t => s.productTab === t ? '#D4548A' : '#aaa';\n\n    const mkProd = p => ({\n      ...p,\n      priceFmt: fmt(p.price),\n      origFmt: p.orig ? fmt(p.orig) : '',\n      hasOrig: !!p.orig,\n      disc: p.orig ? Math.round((1 - p.price / p.orig) * 100) : 0,\n      hasBadge: !!p.badge,\n      wishIcon: s.wishlist.includes(p.id) ? '❤️' : '🤍',\n      catLabel: p.cat === 'skincare' ? 'SKINCARE' : p.cat === 'makeup' ? 'MAKEUP' : 'PARFUM',\n      reviews: p.reviews.toLocaleString('id-ID'),\n      onView: () => this.setState({ screen: 'product', prevScreen: s.screen, selProductId: p.id, selQty: 1, selVars: {}, productTab: 'desc' }),\n      onCart: (e) => { e.stopPropagation(); this._addCart(p, {}, 1); },\n      onWish: (e) => { e.stopPropagation(); this._toggleWish(p.id); },\n    });\n\n    const spVars = sp ? sp.vars.map(vg => ({\n      key: vg.key,\n      chosen: s.selVars[vg.key] || vg.opts[0],\n      opts: vg.opts.map(o => {\n        const chosen = (s.selVars[vg.key] || vg.opts[0]) === o;\n        return { val: o, border: chosen ? '#D4548A' : '#F4A7B9', bg: chosen ? '#FFF0F5' : 'white', color: chosen ? '#D4548A' : '#666', fw: chosen ? '700' : '400', select: () => this.setState(prev => ({ selVars: { ...prev.selVars, [vg.key]: o } })) };\n      }),\n    })) : [];\n\n    const cartItems = s.cart.map(ci => ({\n      ...ci,\n      priceFmt: fmt(ci.product.price * ci.qty),\n      increase: () => this.setState(prev => ({ cart: prev.cart.map(x => x.key === ci.key ? { ...x, qty: x.qty + 1 } : x) })),\n      decrease: () => this.setState(prev => ({ cart: prev.cart.map(x => x.key === ci.key ? { ...x, qty: Math.max(1, x.qty - 1) } : x) })),\n      remove: () => this.setState(prev => ({ cart: prev.cart.filter(x => x.key !== ci.key) })),\n    }));\n\n    return {\n      isHome: s.screen === 'home',\n      isShop: s.screen === 'shop',\n      isProduct: s.screen === 'product',\n      isCart: s.screen === 'cart',\n      isProfile: s.screen === 'profile',\n\n      navHome:    () => this._nav('home'),\n      navShop:    () => this._nav('shop'),\n      navCart:    () => this._nav('cart'),\n      navProfile: () => this._nav('profile'),\n      goBack:     () => this.setState({ screen: s.prevScreen || 'shop', prevScreen: 'home' }),\n      goCartFromHeader: () => this._nav('cart'),\n      goSkincare: () => this.setState({ screen: 'shop', prevScreen: 'home', shopCat: 'skincare' }),\n      goMakeup:   () => this.setState({ screen: 'shop', prevScreen: 'home', shopCat: 'makeup' }),\n      goParfum:   () => this.setState({ screen: 'shop', prevScreen: 'home', shopCat: 'perfume' }),\n\n      navHomeColor:    s.screen === 'home'    ? '#D4548A' : '#999',\n      navShopColor:    s.screen === 'shop'    ? '#D4548A' : '#999',\n      navCartColor:    s.screen === 'cart'    ? '#D4548A' : '#999',\n      navProfileColor: s.screen === 'profile' ? '#D4548A' : '#999',\n      navHomeFill:    s.screen === 'home'    ? '#D4548A' : 'none',\n      navCartFill:    s.screen === 'cart'    ? '#D4548A' : 'none',\n      navProfileFill: s.screen === 'profile' ? '#D4548A' : 'none',\n\n      cartCount,\n      cartNotEmpty: cartCount > 0,\n      cartIsEmpty:  cartCount === 0,\n      cartTotal: fmt(cartTotal),\n      cartTax:   fmt(Math.round(cartTotal * 0.11)),\n      cartGrand: fmt(Math.round(cartTotal * 1.11) + 15000),\n      cartItems,\n\n      toast: s.toast,\n      hasToast: !!s.toast,\n\n      countdown: `${pad(s.countdown.h)}:${pad(s.countdown.m)}:${pad(s.countdown.s)}`,\n\n      homeProducts: homeProds.slice(0, 8).map(mkProd),\n      htAllBg: tabBg('all'),     htAllCl: tabCl('all'),     htAllBo: tabBo('all'),\n      htSkBg:  tabBg('skincare'),htSkCl:  tabCl('skincare'),htSkBo:  tabBo('skincare'),\n      htMkBg:  tabBg('makeup'),  htMkCl:  tabCl('makeup'),  htMkBo:  tabBo('makeup'),\n      htPfBg:  tabBg('perfume'), htPfCl:  tabCl('perfume'), htPfBo:  tabBo('perfume'),\n      setTabAll:  () => this.setState({ homeTab: 'all' }),\n      setTabSkin: () => this.setState({ homeTab: 'skincare' }),\n      setTabMake: () => this.setState({ homeTab: 'makeup' }),\n      setTabPerf: () => this.setState({ homeTab: 'perfume' }),\n\n      shopProducts: shopProds.map(mkProd),\n      shopSearch: s.shopSearch,\n      shopSearchNotEmpty: !!s.shopSearch,\n      filteredCount: shopProds.length,\n      onShopSearch: (e) => this.setState({ shopSearch: e.target.value }),\n      clearShopSearch: () => this.setState({ shopSearch: '' }),\n      shopCatAllBg: sCatBg('all'),     shopCatAllCl: sCatCl('all'),\n      shopCatSkBg:  sCatBg('skincare'),shopCatSkCl:  sCatCl('skincare'),\n      shopCatMkBg:  sCatBg('makeup'),  shopCatMkCl:  sCatCl('makeup'),\n      shopCatPfBg:  sCatBg('perfume'), shopCatPfCl:  sCatCl('perfume'),\n      setShopAll:  () => this.setState({ shopCat: 'all' }),\n      setShopSkin: () => this.setState({ shopCat: 'skincare' }),\n      setShopMake: () => this.setState({ shopCat: 'makeup' }),\n      setShopPerf: () => this.setState({ shopCat: 'perfume' }),\n\n      spName:    sp ? sp.name : '',\n      spEmoji:   sp ? sp.emoji : '',\n      spBg:      sp ? sp.bg : '#FCE4EC',\n      spPrice:   sp ? fmt(sp.price) : '',\n      spOrig:    sp && sp.orig ? fmt(sp.orig) : '',\n      spHasOrig: sp ? !!sp.orig : false,\n      spDisc:    sp && sp.orig ? Math.round((1 - sp.price / sp.orig) * 100) : 0,\n      spBadge:   sp ? sp.badge : '',\n      spBadgeBg: sp ? (sp.badge === 'NEW' ? '#43A047' : sp.badge === 'HOT' ? '#E53935' : '#D4548A') : '#D4548A',\n      spHasBadge: sp ? !!sp.badge : false,\n      spRating:  sp ? String(sp.rating) : '',\n      spReviews: sp ? sp.reviews.toLocaleString('id-ID') : '',\n      spSold:    sp ? sp.sold.toLocaleString('id-ID') : '',\n      spStock:   sp ? sp.stock : 0,\n      spDesc:    sp ? sp.desc : '',\n      spHow:     sp ? sp.how : '',\n      spCatLabel:sp ? (sp.cat === 'skincare' ? 'SKINCARE' : sp.cat === 'makeup' ? 'MAKEUP' : 'PARFUM') : '',\n      spWishIcon: sp ? (s.wishlist.includes(sp.id) ? '❤️' : '🤍') : '🤍',\n      toggleWishSP: () => sp && this._toggleWish(sp.id),\n      spVariations: spVars,\n      selQty: s.selQty,\n      decQty: () => this.setState({ selQty: Math.max(1, s.selQty - 1) }),\n      incQty: () => this.setState({ selQty: s.selQty + 1 }),\n      addToCartSP: () => { if (sp) { this._addCart(sp, s.selVars, s.selQty); } },\n      buyNow: () => { if (sp) { this._addCart(sp, s.selVars, s.selQty); this._nav('cart'); } },\n\n      tabIsDesc: s.productTab === 'desc',\n      tabIsHow:  s.productTab === 'how',\n      tabIsRev:  s.productTab === 'rev',\n      tabDescBo: ptBo('desc'), tabDescCl: ptCl('desc'),\n      tabHowBo:  ptBo('how'),  tabHowCl:  ptCl('how'),\n      tabRevBo:  ptBo('rev'),  tabRevCl:  ptCl('rev'),\n      setTabDesc: () => this.setState({ productTab: 'desc' }),\n      setTabHow:  () => this.setState({ productTab: 'how' }),\n      setTabRev:  () => this.setState({ productTab: 'rev' }),\n\n      wishlistCount: s.wishlist.length,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
